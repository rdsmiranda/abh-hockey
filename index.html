<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitio en Mantenimiento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #0b0c0f;
      color: #a0a8be;
      font-family: 'Syne', sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f0c040;
      display: inline-block;
      margin-bottom: 2.5rem;
      animation: pulse 2.4s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .35; transform: scale(.7); }
    }

    h1 {
      font-size: clamp(1rem, 6.5vw, 3.6rem);
      font-weight: 800;
      color: #eef0f6;
      letter-spacing: -.02em;
      line-height: 1.1;
      margin: 0 0 1.25rem;
      animation: up .5s ease both;
      word-break: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
      hyphens: auto;
      -webkit-hyphens: auto;
    }

    p.lead {
      font-size: clamp(.95rem, 2vw, 1.1rem);
      font-weight: 400;
      color: #5c6278;
      max-width: 400px;
      line-height: 1.75;
      margin: 0 0 2.5rem;
      animation: up .5s .1s ease both;
    }

    a.contact {
      font-size: .8rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #f0c040;
      text-decoration: none;
      border-bottom: 1px solid #f0c04044;
      padding-bottom: 2px;
      transition: border-color .2s;
      animation: up .5s .2s ease both;
    }

    a.contact:hover { border-color: #f0c040; }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      width: 100%;
      text-align: center;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #22262f;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="dot"></div>

    <h1>Sitio en mantenimiento</h1>

    <p class="lead">
      Estamos trabajando en mejoras.
    </p>
  </div>

  <div class="footer">Comisión de Árbitros</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
          crossorigin="anonymous"></script>
</body>
</html>
