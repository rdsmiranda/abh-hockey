name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # permite disparar el deploy manualmente desde la pestaña Actions

permissions:
  contents: write   # necesario para poder pushear al branch gh-pages

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false  # evita que un deploy nuevo corte uno en curso, previniendo estados intermedios raros

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # Ajustá el comando si tu script de build se llama distinto

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist   # ajustá si tu build genera otra carpeta (build/, public/, etc.)
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          # force_orphan: true  # descomentar si querés que el branch gh-pages no acumule historial
